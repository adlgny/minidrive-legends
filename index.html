<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniDrive Legends</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

header {
    background: #e63946;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

section {
    padding: 20px;
}

.gallery {
    display: flex;
    overflow-x: auto;
}

.gallery img {
    width: 150px;
    margin-right: 10px;
    border-radius: 10px;
}

video {
    width: 100%;
    border-radius: 10px;
}

.catalog {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
}

select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    background: #e63946;
    color: white;
    border: none;
}
</style>
</head>

<body>

<header>
🚗 MiniDrive Legends
</header>

<section>
<h2>Koleksiyon</h2>
<div class="gallery">
<img src="car1.jpg">
<img src="car2.jpg">
<img src="car3.jpg">
</div>
</section>

<section>
<h2>Video</h2>
<video controls>
<source src="video.mp4" type="video/mp4">
</video>
</section>

<section class="catalog">
<h2>Model Seç & Fiyat Sor</h2>

<select id="carModel">
<option>Hot Wheels Ford Mustang</option>
<option>Matchbox Porsche 911</option>
<option>Lego F1 Ferrari SF-24</option>
<option>Lego F1 Mercedes W14</option>
<option>Lego Speed Champions McLaren</option>
</select>

<button onclick="sendWhatsApp()">Fiyat Sor</button>
</section>

<script>
function sendWhatsApp() {
    let model = document.getElementById("carModel").value;

    let part1 = "90543";
    let part2 = "6060906";

    let phone = part1 + part2;

    let message = "Merhaba, " + model + " modeli için fiyat almak istiyorum.";
    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
</html>
