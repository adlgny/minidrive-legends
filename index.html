<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniDrive Legends</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
}

header img {
    width: 140px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px 20px;
}

.hero h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.hero p {
    opacity: 0.7;
}

/* GALLERY SLIDER */
.gallery {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 180px;
    border-radius: 12px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* VIDEO */
.video {
    padding: 20px;
}

.video video {
    width: 100%;
    border-radius: 12px;
}

/* CATALOG */
.catalog {
    background: #141414;
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
}

.catalog h2 {
    margin-bottom: 10px;
}

select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
}

button {
    background: linear-gradient(90deg, #e63946, #ff4d5a);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* WHATSAPP FLOAT */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 12px 15px;
    border-radius: 50px;
    font-size: 14px;
    cursor: pointer;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    opacity: 0.5;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
</header>

<section class="hero">
<h1>MiniDrive Legends</h1>
<p>Gerçek araçların 1/64 ve Lego minyatür koleksiyonu</p>
</section>

<section>
<div class="gallery">
<img src="car1.jpg">
<img src="car2.jpg">
<img src="car3.jpg">
<img src="car4.jpg">
</div>
</section>

<section class="video">
<video controls>
<source src="video.mp4" type="video/mp4">
</video>
</section>

<section class="catalog">
<h2>Model Seç & Fiyat Sor</h2>

<select id="carModel">
<option>Hot Wheels Ford Mustang</option>
<option>Matchbox Porsche 911</option>
<option>Lego F1 Ferrari SF-24</option>
<option>Lego F1 Mercedes W14</option>
<option>Lego Speed Champions McLaren</option>
</select>

<button onclick="sendWhatsApp()">Fiyat Sor</button>
</section>

<div class="whatsapp" onclick="sendWhatsApp()">
💬 WhatsApp
</div>

<footer>
© 2026 MiniDrive Legends
</footer>

<script>
function sendWhatsApp() {
    let model = document.getElementById("carModel").value;

    let part1 = "90543";
    let part2 = "6060906";
    let phone = part1 + part2;

    let message = "Merhaba, " + model + " modeli için fiyat almak istiyorum.";
    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
