<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniDrive Legends</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 40px;
    font-weight: 600;
}

.hero p {
    opacity: 0.6;
    margin-top: 10px;
}

/* GLASS CARD */
.section {
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
}

/* GALLERY */
.gallery {
    display: flex;
    overflow-x: auto;
    gap: 15px;
}

.gallery img {
    width: 200px;
    border-radius: 15px;
}

/* PRODUCT CARDS */
.products {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.card {
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: white;
    color: black;
    padding: 10px 15px;
    border-radius: 30px;
}
</style>
</head>

<body>

<section class="hero">
<h1>MiniDrive Legends</h1>
<p>Gerçek araçların minyatür koleksiyonu</p>
</section>

<section class="section">
<h2>Koleksiyon</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c">
<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7">
</div>
</section>

<section class="section">
<h2>Modeller</h2>

<div class="products">

<div class="card">
Ford Mustang - Hot Wheels
<button onclick="ask('Ford Mustang')">Fiyat Sor</button>
</div>

<div class="card">
Porsche 911 - Matchbox
<button onclick="ask('Porsche 911')">Fiyat Sor</button>
</div>

<div class="card">
Ferrari F1 - Lego
<button onclick="ask('Ferrari F1')">Fiyat Sor</button>
</div>

</div>

</section>

<div class="whatsapp" onclick="ask('Merhaba')">
WhatsApp
</div>

<script>
function ask(model) {

let part1 = "90543";
let part2 = "6060906";
let phone = part1 + part2;

let message = model + " modeli için fiyat almak istiyorum.";
let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");
}
</script>

</body>
</html>
